map $http_accept_language $docs_lang {
    default en;
    ~*^ru(?:$|[^A-Za-z]) ru;
    ~*^es(?:$|[^A-Za-z]) es;
    ~*^en(?:$|[^A-Za-z]) en;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = / {
        add_header Vary Accept-Language always;
        return 302 /$docs_lang/index.html;
    }

    location = /ru {
        return 302 /ru/index.html;
    }

    location = /en {
        return 302 /en/index.html;
    }

    location = /es {
        return 302 /es/index.html;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
